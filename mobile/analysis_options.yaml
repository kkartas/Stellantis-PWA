include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.mapper.dart"

linter:
  rules:
    # public_member_api_docs: this is an app, not a published library.
    # Requiring doc comments on every internal widget constructor and method
    # adds noise without benefit; disabled at project level.
    public_member_api_docs: false
    # cascade_invocations: the inWebo tokenizer consumes values positionally;
    # mixing cascades with return-value captures harms readability.
    cascade_invocations: false
    # use_late_for_private_fields_and_variables: OtpService uses nullable
    # fields as state flags (null = not yet initialized); late would lose that.
    use_late_for_private_fields_and_variables: false
