<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline - Stellantis Car Controller</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", sans-serif;
        background: #0f2745;
        color: #f4f7fb;
      }
      article {
        max-width: 480px;
        background: rgba(6, 18, 31, 0.8);
        border: 1px solid rgba(191, 216, 242, 0.2);
        border-radius: 14px;
        padding: 1.2rem;
      }
      h1 {
        margin-top: 0;
      }
      p {
        color: #bdcde0;
      }
    </style>
  </head>
  <body>
    <article>
      <h1>You are offline</h1>
      <p>The app shell is available, but live vehicle data needs a backend connection.</p>
      <p>Reconnect to the network and refresh to continue.</p>
    </article>
  </body>
</html>
