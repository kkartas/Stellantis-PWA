name: stellantis_mobile
description: Stellantis connected-car Flutter app — direct cloud, no backend.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  crypto: ^3.0.3
  cupertino_icons: ^1.0.8
  dart_mappable: ^4.3.0
  dio: ^5.7.0
  fl_chart: ^0.70.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.2.4
  flutter_map: ^7.0.2
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  flutter_svg: ^2.0.17
  flutter_web_auth_2: ^4.0.0
  go_router: ^14.0.0
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  latlong2: ^0.9.1
  lottie: ^3.1.0
  mqtt_client: ^10.0.0
  path_provider: ^2.0.0
  pointycastle: ^3.9.1
  rive: ^0.13.17
  riverpod_annotation: ^2.4.0
  sqflite: ^2.3.0
  workmanager: ^0.9.0+3
  xml: ^6.0.0
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.4.13
  dart_mappable_builder: ^4.3.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  golden_toolkit: ^0.15.0
  isar_generator: ^3.1.0
  mocktail: ^1.0.4
  riverpod_generator: ^2.4.0
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brands/
    - assets/animations/
    - assets/data/car_models.yml
