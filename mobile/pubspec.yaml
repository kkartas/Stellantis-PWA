name: stellantis_mobile
description: Stellantis connected-car Flutter app — direct cloud, no backend.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.0.0
  dio: ^5.7.0
  mqtt_client: ^10.0.0
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  flutter_secure_storage: ^9.2.2
  dart_mappable: ^4.3.0
  fl_chart: ^0.70.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  rive: ^0.13.17
  lottie: ^3.1.0
  workmanager: ^0.5.2
  flutter_local_notifications: ^17.2.4
  flutter_svg: ^2.0.17
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  very_good_analysis: ^6.0.0
  riverpod_generator: ^2.6.1
  dart_mappable_builder: ^4.3.0
  build_runner: ^2.4.13
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/brands/
    - assets/animations/
    - assets/data/car_models.yml
